<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word King 👑 | Thilina Kumara</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f39c12">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f39c12; --bg: #f8f9fa; --dark: #2c3e50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; overflow: hidden; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-bottom: 8px solid var(--primary); }
        .user-info { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; font-weight: bold; background: #fff4e6; padding: 12px; border-radius: 15px; color: #d35400; }
        .hint-box { background: #fdfaf6; padding: 20px; border-radius: 20px; text-align: left; margin: 15px 0; border: 1px solid #ffeaa7; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .hint-si { font-size: 17px; color: var(--dark); font-weight: bold; line-height: 1.5; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 8px; margin: 20px 0; flex-wrap: wrap; }
        .cell { width: 48px; height: 55px; border: 2px solid #e0e0e0; border-radius: 12px; text-align: center; font-size: 24px; font-weight: bold; text-transform: uppercase; outline: none; background: #fff; transition: 0.2s; }
        .cell:focus { border-color: var(--primary); background: #fffdf0; transform: scale(1.05); }
        .cell:disabled { background: #f1f2f6; color: #95a5a6; border-color: #eee; }
        .btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; box-shadow: 0 5px #d35400; transition: 0.1s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px #d35400; }
        #msg { height: 25px; margin-top: 15px; font-weight: bold; font-size: 14px; }
        .watermark { margin-top: 25px; font-size: 11px; color: #bdc3c7; font-weight: bold; letter-spacing: 1px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginScreen" class="card">
    <div style="font-size: 50px;">👑</div>
    <h1 style="color: var(--primary); margin: 10px 0;">WORD KING</h1>
    <p style="font-size: 14px; color: #7f8c8d; margin-bottom: 20px;">By Thilina Kumara</p>
    <input type="text" id="playerNameInput" style="width:100%; padding:15px; margin-bottom:20px; border:2px solid #eee; border-radius:15px; text-align:center; font-size:16px;" placeholder="ඔබේ නම ඇතුළත් කරන්න">
    <button class="btn" onclick="startGame()">ක්‍රීඩාව අරඹන්න</button>
</div>

<div id="gameScreen" class="card hidden">
    <div class="user-info">
        <span>👤 <span id="displayName"></span></span>
        <span>🏆 SCORE: <span id="displayScore">0</span></span>
    </div>
    <div class="hint-box">
        <div class="hint-si" id="hintSi">සූදානම් වන්න...</div>
    </div>
    <div class="grid" id="wordGrid"></div>
    <button class="btn" onclick="checkAnswer()">පරීක්ෂා කරන්න</button>
    <div id="msg"></div>
    <div class="watermark">DESIGNED BY L THILINA KUMARA</div>
</div>

<audio id="winSnd" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="failSnd" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
    const masterBank = [
        {w: "APPLE", h: "රතු හෝ කොළ පැහැති රසවත් පලතුරක්"},
        {w: "WATER", h: "ජීවත් වීමට අත්‍යවශ්‍ය බොන දෙය"},
        {w: "SCHOOL", h: "අකුරු ඉගෙන ගැනීමට යන ස්ථානය"},
        {w: "MOTHER", h: "ලොවට බිහි කළ ආදරණීයම කාන්තාව"},
        {w: "TREE", h: "සාකයක් හදුන් වන නම"},
        {w: "SMILE", h: "සතුටු වූ විට මුහුණේ ඇතිවන ඉරියව්ව"},
        {w: "HOUSE", h: "අප ජීවත් වන නිවස"},
        {w: "RIVER", h: "ගලා යන විශාල ජල කඳක්"},
        {w: "BIRD", h: "අහසේ පියාසර කරන සත්වයෙක්"},
        {w: "TRAIN", h: "පීලි මත දුවන දිගු වාහනය"},
        {w: "FATHER", h: "පවුලක ප්‍රධානියා ලෙස සැලකෙන පියා"},
        {w: "GARDEN", h: "මල් සහ ගස් වවා ඇති ලස්සන භූමිය"},
        {w: "SUN", h: "දවල් කාලයේ ලොවට ආලෝකය දෙන තරුව"},
        {w: "KING", h: "රටක් පාලනය කරන ප්‍රධානියා"},
        {w: "MILK", h: "එළදෙනගෙන් ලබාගන්නා සුදු පානය"},
        {w: "EARTH", h: "අප ජීවත් වන ග්‍රහලෝකය"},
        {w: "FLOWER", h: "මිහිරි සුවඳක් දෙන ශාකයක කොටසක්"}
    ];

    let currentIdx = 0;
    let score = 0;
    let currentWord = "";

    // ඇප් එක Load වන විට කලින් තිබූ තොරතුරු ලබා ගැනීම
    window.onload = () => {
        const savedName = localStorage.getItem('wk_name');
        const savedIdx = localStorage.getItem('wk_idx');
        const savedScore = localStorage.getItem('wk_score');

        if(savedName && savedIdx !== null) {
            currentIdx = parseInt(savedIdx);
            score = parseInt(savedScore) || 0;
            document.getElementById('playerNameInput').value = savedName;
            startGame(); // කෙලින්ම Game එකට යන්න
        }
    }

    function startGame() {
        const name = document.getElementById('playerNameInput').value;
        if(!name) return alert("නම ඇතුළත් කරන්න!");
        
        localStorage.setItem('wk_name', name);
        document.getElementById('displayName').innerText = name;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        loadWord();
    }

    function loadWord() {
        document.getElementById('msg').innerText = "";
        document.getElementById('wordGrid').innerHTML = "";
        
        let data = masterBank[currentIdx % masterBank.length];
        currentWord = data.w.toUpperCase();
        document.getElementById('hintSi').innerText = data.h;
        document.getElementById('displayScore').innerText = score;

        // Level එක සහ Score එක ස්ථිරවම Save කිරීම
        localStorage.setItem('wk_idx', currentIdx);
        localStorage.setItem('wk_score', score);

        for (let i = 0; i < currentWord.length; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'cell';
            input.maxLength = 1;
            input.id = 'c' + i;
            if (i === 0 || i === currentWord.length - 1) { input.value = currentWord[i]; input.disabled = true; }
            input.oninput = function() {
                if (this.value) {
                    let next = document.getElementById('c' + (i + 1));
                    if (next && next.disabled) next = document.getElementById('c' + (i + 2));
                    if (next) next.focus();
                }
            };
            document.getElementById('wordGrid').appendChild(input);
        }
    }

    function checkAnswer() {
        let guess = "";
        for (let i = 0; i < currentWord.length; i++) guess += document.getElementById('c' + i).value.toUpperCase();

        const msgDiv = document.getElementById('msg');
        if (guess === currentWord) {
            try { document.getElementById('winSnd').play(); } catch(e){}
            msgDiv.innerText = "✅ නිවැරදියි!";
            msgDiv.style.color = "#27ae60";
            score += 10;
            currentIdx++;
            setTimeout(loadWord, 1500);
        } else {
            try { document.getElementById('failSnd').play(); } catch(e){}
            msgDiv.innerText = "❌ වැරදියි, නැවත උත්සාහ කරන්න!";
            msgDiv.style.color = "#e74c3c";
            if (navigator.vibrate) navigator.vibrate(200);
        }
    }
</script>
</body>
</html>
