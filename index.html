<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word King рҹ‘‘ | Thilina Kumara</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f39c12">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f39c12; --bg: #f8f9fa; --dark: #2c3e50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; overflow: hidden; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-bottom: 8px solid var(--primary); }
        .user-info { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; font-weight: bold; background: #fff4e6; padding: 12px; border-radius: 15px; color: #d35400; }
        .hint-box { background: #fdfaf6; padding: 20px; border-radius: 20px; text-align: left; margin: 15px 0; border: 1px solid #ffeaa7; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .hint-si { font-size: 17px; color: var(--dark); font-weight: bold; line-height: 1.5; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 8px; margin: 20px 0; flex-wrap: wrap; }
        .cell { width: 45px; height: 50px; border: 2.5px solid #ddd; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; text-transform: uppercase; outline: none; background: #fff; }
        .cell:focus { border-color: var(--primary); background: #fffdf0; }
        .cell:disabled { background: #f1f2f6; color: #95a5a6; }
        .btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; box-shadow: 0 5px #d35400; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px #d35400; }
        .hidden { display: none; }
        .watermark { margin-top: 20px; font-size: 10px; color: #bdc3c7; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginScreen" class="card">
    <div style="font-size: 50px;">рҹ‘‘</div>
    <h1 style="color: var(--primary);">WORD KING</h1>
    <p style="font-size: 13px; color: #7f8c8d;">By L Thilina Kumara</p>
    <input type="text" id="playerNameInput" style="width:100%; padding:15px; margin:20px 0; border:2px solid #eee; border-radius:15px; text-align:center;" placeholder="а¶”а¶¶а·ҡ а¶ұа¶ё...">
    <button class="btn" onclick="startGame()">START GAME</button>
</div>

<div id="gameScreen" class="card hidden">
    <div class="user-info">
        <span>рҹ‘Ө <span id="displayName"></span></span>
        <span>рҹҸҶ SCORE: <span id="displayScore">0</span></span>
    </div>
    <div class="hint-box">
        <div class="hint-si" id="hintSi">а¶ҙа·–а¶»а¶«а¶ә а·Җа·ҷа¶ёа·’а¶ұа·Ҡ...</div>
    </div>
    <div class="grid" id="wordGrid"></div>
    <button class="btn" onclick="checkAnswer()">CHECK ANSWER</button>
    <div id="msg" style="margin-top:10px; font-weight:bold;"></div>
    <div class="watermark">DESIGNED BY L THILINA KUMARA</div>
</div>

<script>
    // а¶ёа¶ё а¶ёа·ҷа¶ӯа¶ұа¶§ а¶ҙа·ҠвҖҚа¶»а·Ға·Ҡа¶ұ а¶ңа·ңа¶©а¶ҡа·Ҡ а¶‘а¶ҡа¶ӯа·” а¶ҡа·…а·Ҹ
    const masterBank = [
        {w: "APPLE", h: "а¶»а¶ӯа·” а·„а·қ а¶ҡа·ңа·… а¶ҙа·җа·„а·җа¶ӯа·’ а¶»а·ға·Җа¶ӯа·Ҡ а¶ҙа¶Ҫа¶ӯа·”а¶»а¶ҡа·Ҡ"},
        {w: "WATER", h: "а¶ўа·“а·Җа¶ӯа·Ҡ а·Җа·“а¶ёа¶§ а¶…а¶ӯа·ҠвҖҚа¶әа·Җа·Ға·ҠвҖҚа¶ә а¶¶а·ңа¶ұ а¶Ҝа·ҷа¶ә"},
        {w: "SCHOOL", h: "а¶…а¶ҡа·”а¶»а·” а¶үа¶ңа·ҷа¶ұ а¶ңа·җа¶ұа·“а¶ёа¶§ а¶әа¶ұ а·ға·Ҡа¶®а·Ҹа¶ұа¶ә"},
        {w: "MOTHER", h: "а¶Ҫа·ңа·Җа¶§ а¶¶а·’а·„а·’ а¶ҡа·… а¶Ҷа¶Ҝа¶»а¶«а·“а¶әа¶ё а¶ҡа·Ҹа¶ұа·Ҡа¶ӯа·Ҹа·Җ"},
        {w: "TREE", h: "а¶…а¶ӯа·” а¶ҙа¶ӯа¶» а·Җа·’а·„а·’а¶Ҝа·”а¶«а·” а·Җа·’а·Ға·Ҹа¶Ҫ а·Ға·Ҹа¶ҡа¶ә"},
        {w: "SMILE", h: "а·ға¶ӯа·”а¶§а·” а·Җа·– а·Җа·’а¶§ а¶ёа·”а·„а·”а¶«а·ҡ а¶Үа¶ӯа·’а·Җа¶ұ а¶үа¶»а·’а¶әа·Җа·Ҡа·Җ"},
        {w: "HOUSE", h: "а¶…а¶ҙ а¶ўа·“а·Җа¶ӯа·Ҡ а·Җа¶ұ а¶ұа·’а·Җа·ғ"},
        {w: "RIVER", h: "а¶ңа¶Ҫа·Ҹ а¶әа¶ұ а·Җа·’а·Ға·Ҹа¶Ҫ а¶ўа¶Ҫ а¶ҡа¶іа¶ҡа·Ҡ"},
        {w: "BIRD", h: "а¶…а·„а·ға·ҡ а¶ҙа·’а¶әа·Ҹа·ға¶» а¶ҡа¶»а¶ұ а·ға¶ӯа·Ҡа·Җа¶әа·ҷа¶ҡа·Ҡ"},
        {w: "TRAIN", h: "а¶ҙа·“а¶Ҫа·’ а¶ёа¶ӯ а¶Ҝа·”а·Җа¶ұ а¶Ҝа·’а¶ңа·” а·Җа·Ҹа·„а¶ұа¶ә"},
        {w: "FATHER", h: "а¶ҙа·Җа·”а¶Ҫа¶ҡ а¶ҙа·ҠвҖҚа¶»а¶°а·Ҹа¶ұа·’а¶әа·Ҹ а¶Ҫа·ҷа·ғ а·ға·җа¶Ҫа¶ҡа·ҷа¶ұ а¶ҙа·’а¶әа·Ҹ"},
        {w: "GARDEN", h: "а¶ёа¶Ҫа·Ҡ а·ға·„ а¶ңа·ға·Ҡ а·Җа·Җа·Ҹ а¶Үа¶ӯа·’ а¶Ҫа·ға·Ҡа·ға¶ұ а¶·а·–а¶ёа·’а¶ә"},
        {w: "SUN", h: "а¶Ҝа·Җа¶Ҫа·Ҡ а¶ҡа·Ҹа¶Ҫа¶әа·ҡ а¶Ҫа·ңа·Җа¶§ а¶Ҷа¶Ҫа·қа¶ҡа¶ә а¶Ҝа·ҷа¶ұ а¶ӯа¶»а·”а·Җ"},
        {w: "KING", h: "а¶»а¶§а¶ҡа·Ҡ а¶ҙа·Ҹа¶Ҫа¶ұа¶ә а¶ҡа¶»а¶ұ а¶ҙа·ҠвҖҚа¶»а¶°а·Ҹа¶ұа·’а¶әа·Ҹ"},
        {w: "MILK", h: "а¶‘а·…а¶Ҝа·ҷа¶ұа¶ңа·ҷа¶ұа·Ҡ а¶Ҫа¶¶а·Ҹа¶ңа¶ұа·Ҡа¶ұа·Ҹ а·ға·”а¶Ҝа·” а¶ҙа·Ҹа¶ұа¶ә"},
        {w: "EARTH", h: "а¶…а¶ҙ а¶ўа·“а·Җа¶ӯа·Ҡ а·Җа¶ұ а¶ңа·ҠвҖҚа¶»а·„а¶Ҫа·қа¶ҡа¶ә"},
        {w: "FLOWER", h: "а¶ёа·’а·„а·’а¶»а·’ а·ға·”а·Җа¶іа¶ҡа·Ҡ а¶Ҝа·ҷа¶ұ а·Ға·Ҹа¶ҡа¶әа¶ҡ а¶ҡа·ңа¶§а·ға¶ҡа·Ҡ"},
        {w: "BOTTLE", h: "а·Җа¶ӯа·”а¶» а¶ҙа·”а¶»а·Җа¶ұ а¶·а·Ҹа¶ўа¶ұа¶ә"},
        {w: "CHAIR", h: "а·Җа·Ҹа¶©а·’ а·Җа·“а¶ёа¶§ а¶ңа¶ұа·Ҡа¶ұа·Ҹ а¶ңа·ҳа·„ а¶·а·Ҹа¶«а·Ҡа¶©а¶әа¶ҡа·Ҡ"},
        {w: "BREAD", h: "а¶ҙа·Ҹа¶ұа·Ҡ а¶ҙа·’а¶§а·’а·Җа¶Ҫа·’а¶ұа·Ҡ а·„а¶Ҝа¶ұ а¶Ҷа·„а·Ҹа¶»а¶әа¶ҡа·Ҡ"},
        {w: "CLOCK", h: "а·Җа·ҷа¶Ҫа·Ҹа·Җ а¶¶а·җа¶Ҫа·“а¶ёа¶§ а¶ңа¶ұа·Ҡа¶ұа·Ҹ а¶Ӣа¶ҙа¶ҡа¶»а¶«а¶ә"},
        {w: "SHIRT", h: "а¶Үа¶ҹа¶§ а¶…а¶іа·’а¶ұ а¶Үа¶іа·”а¶ёа¶ҡа·Ҡ"},
        {w: "SPOON", h: "а¶ҡа·‘а¶ё а¶ҡа¶ұа·Ҡа¶ұ а¶ңа¶ұа·Ҡа¶ұа·Ҹ а·„а·җа¶ұа·Ҡа¶Ҝ"},
        {w: "ORANGE", h: "а¶ӯа·җа¶№а·’а¶Ҫа·’ а¶ҙа·җа·„а·җа¶ӯа·’ а¶ҙа¶Ҫа¶ӯа·”а¶»а¶ҡа·Ҡ"},
        {w: "MOUNTAIN", h: "а¶үа¶ӯа·Ҹ а¶Ӣа·ғ а·Җа·’а·Ға·Ҹа¶Ҫ а¶ҡа¶ұа·Ҡа¶Ҝ"},
        {w: "PENCIL", h: "а¶…а¶ҡа·”а¶»а·” а¶Ҫа·’а·Җа·“а¶ёа¶§ а¶ңа¶ұа·Ҡа¶ұа·Ҹ а¶Ӣа¶ҙа¶ҡа¶»а¶«а¶ә"},
        {w: "DOCTOR", h: "а¶Ҫа·ҷа¶©а·”а¶ұа·Ҡа¶§ а¶¶а·ҷа·„а·ҷа¶ӯа·Ҡ а¶Ҝа·ҷа¶ұ а¶ҡа·ҷа¶ұа·Ҹ"},
        {w: "BICYCLE", h: "а¶»а·қа¶Ҝ а¶Ҝа·ҷа¶ҡа·ҡ а·Җа·Ҹа·„а¶ұа¶ә"},
        {w: "COFFEE", h: "а¶Ӣа¶Ҝа·‘а·ға¶ұ а¶¶а·ңа¶ұ а¶ӯа·’а¶ӯа·Ҡа¶ӯ а¶¶а·“а¶ёа¶ҡа·Ҡ"},
        {w: "COMPUTER", h: "а·Җа·җа¶© а¶ҙа·„а·ға·” а¶ҡа¶»а¶ұ а·Җа·’а¶Ҝа·ҠвҖҚа¶әа·”а¶ӯа·Ҡ а¶әа¶ұа·Ҡа¶ӯа·ҠвҖҚа¶»а¶ә"}
    ];

    let currentIdx = 0;
    let score = 0;
    let currentWord = "";

    window.onload = () => {
        const savedName = localStorage.getItem('wk_name');
        const savedIdx = localStorage.getItem('wk_idx');
        const savedScore = localStorage.getItem('wk_score');

        if(savedName && savedIdx !== null) {
            currentIdx = parseInt(savedIdx);
            score = parseInt(savedScore) || 0;
            document.getElementById('playerNameInput').value = savedName;
            startGame();
        }
    }

    function startGame() {
        const name = document.getElementById('playerNameInput').value;
        if(!name) return;
        localStorage.setItem('wk_name', name);
        document.getElementById('displayName').innerText = name;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        loadWord();
    }

    async function loadWord() {
        const grid = document.getElementById('wordGrid');
        grid.innerHTML = "";
        document.getElementById('msg').innerText = "";
        
        // а¶ҙа·ҠвҖҚа¶»а·Ға·Ҡа¶ұ а¶¶а·җа¶Ӯа¶ҡа·”а·Җ а¶үа·Җа¶» а·Җа·”а¶«а·ңа¶ӯа·Ҡ а¶…а¶ұа·Ҡа¶ӯа¶»а·Ҡа¶ўа·Ҹа¶Ҫа¶әа·ҷа¶ұа·Ҡ а·Җа¶ а¶ұ а¶ңа¶ұа·“ (API)
        if (currentIdx < masterBank.length) {
            let data = masterBank[currentIdx];
            currentWord = data.w.toUpperCase();
            document.getElementById('hintSi').innerText = data.h;
            setupGrid(currentWord);
        } else {
            fetchNewWord();
        }
        
        document.getElementById('displayScore').innerText = score;
        localStorage.setItem('wk_idx', currentIdx);
        localStorage.setItem('wk_score', score);
    }

    async function fetchNewWord() {
        document.getElementById('hintSi').innerText = "а¶…а¶Ҫа·”а¶ӯа·Ҡ а¶ҙа·ҠвҖҚа¶»а·Ға·Ҡа¶ұа¶әа¶ҡа·Ҡ а·ға·ңа¶әа¶ёа·’а¶ұа·Ҡ...";
        try {
            const res = await fetch('https://random-word-api.herokuapp.com/word?length=5');
            const data = await res.json();
            const word = data[0].toUpperCase();
            
            // а·ға·’а¶Ӯа·„а¶Ҫа¶§ а¶ҙа¶»а·’а·Җа¶»а·Ҡа¶ӯа¶ұа¶ә (MyMemory API)
            const trans = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|si`);
            const transData = await trans.json();
            
            currentWord = word;
            document.getElementById('hintSi').innerText = "а¶ёа·ҷа¶ә а·„а¶іа·”а¶ұа·Ҹа¶ңа¶ұа·Ҡа¶ұ: " + transData.responseData.translatedText;
            setupGrid(word);
        } catch(e) {
            currentIdx = 0; // Error а¶‘а¶ҡа¶ҡа·Ҡ а¶Ҷа·Җа·ңа¶ӯа·Ҡ а¶ёа·”а¶Ҫ а·ға·’а¶§ а¶ҙа¶§а¶ұа·Ҡ а¶ңа¶ұа·“
            loadWord();
        }
    }

    function setupGrid(word) {
        const grid = document.getElementById('wordGrid');
        for (let i = 0; i < word.length; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'cell';
            input.maxLength = 1;
            input.id = 'c' + i;
            if (i === 0 || i === word.length - 1) { input.value = word[i]; input.disabled = true; }
            input.oninput = function() {
                if (this.value) {
                    let next = document.getElementById('c' + (i + 1));
                    if (next && next.disabled) next = document.getElementById('c' + (i + 2));
                    if (next) next.focus();
                }
            };
            grid.appendChild(input);
        }
    }

    function checkAnswer() {
        let guess = "";
        for (let i = 0; i < currentWord.length; i++) guess += document.getElementById('c' + i).value.toUpperCase();

        if (guess === currentWord) {
            document.getElementById('msg').innerText = "вң… а¶ұа·’а·Җа·җа¶»а¶Ҝа·’а¶әа·’!";
            document.getElementById('msg').style.color = "green";
            score += 10;
            currentIdx++;
            setTimeout(loadWord, 1000);
        } else {
            document.getElementById('msg').innerText = "вқҢ а·Җа·җа¶»а¶Ҝа·’а¶әа·’!";
            document.getElementById('msg').style.color = "red";
        }
    }
</script>
</body>
</html>
